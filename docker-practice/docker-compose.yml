

services:
  # "web" 이라는 이름의 서비스(컨테이너)를 정의해요.
  web:
    # 현재 폴더(.)의 Dockerfile 을 사용해서 이미지를 빌드해요.
    build: .
    # .env 파일을 런타임에 읽어와서 환경변수로 주입해요.
    # 이렇게 하면 .env 를 고쳐도 다시 빌드할 필요 없이 컨테이너만 재생성하면 반영돼요.
    env_file:
      - .env
    # 포트 매핑: 내 컴퓨터의 5000번 포트를 컨테이너의 5000번 포트와 연결해요.
    # 왼쪽이 내 컴퓨터, 오른쪽이 컨테이너 포트예요. (localhost:5000 으로 접속)
    ports:
      - "5000:5000"
